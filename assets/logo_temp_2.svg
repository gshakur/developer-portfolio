<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7000ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Hexagon -->
  <path d="M50 5 L93.3 30 V80 L50 105 L6.7 80 V30 Z" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.3" transform="scale(0.9) translate(5.5,2.5)"/>

  <!-- Stylized S -->
  <path d="M65 35 H40 C35 35 32 38 32 42 V45 C32 49 35 52 40 52 H60 C65 52 68 55 68 59 V62 C68 66 65 69 60 69 H35" 
        fill="none" 
        stroke="url(#mainGradient)" 
        stroke-width="5" 
        stroke-linecap="round" 
        filter="url(#glow)" />
        
  <!-- Stylized G (Interlocked/Overlay check - doing purely S-G creates complexity at this scale) -->
  <!-- Let's do a tech-circle G surrounding the S? No. -->
  <!-- Let's do a strict Monogram. -->
  
</svg>
