<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Mr Shakur</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="admin-dashboard-page">
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <img src="logo.jpg" alt="Logo" class="login-logo" style="height: 40px; margin-bottom: 0;">
                <h2>Admin</h2>
            </div>
            <nav class="nav-menu">
                <a href="#overview" class="nav-link active" data-section="overview">
                    <i class="fas fa-chart-line"></i>
                    <span>Overview</span>
                </a>
                <a href="#projects" class="nav-link" data-section="projects">
                    <i class="fas fa-tasks"></i>
                    <span>Projects</span>
                </a>
                <a href="#content" class="nav-link" data-section="content">
                    <i class="fas fa-edit"></i>
                    <span>Content</span>
                </a>
                <a href="#messages" class="nav-link" data-section="messages">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="logout-btn" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Overview Section -->
            <section id="overview" class="dashboard-section active">
                <div class="section-header">
                    <h1>Dashboard Overview</h1>
                    <p>Welcome back, Mr Shakur. Here's what's happening today.</p>
                </div>
                <div class="grid-stats">
                    <div class="stat-card">
                        <h3>Total Projects</h3>
                        <p id="stat-projects">3</p>
                    </div>
                    <div class="stat-card">
                        <h3>New Messages</h3>
                        <p id="stat-messages">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Profile Views</h3>
                        <p>1.2k</p>
                    </div>
                </div>
            </section>

            <!-- Projects Section -->
            <section id="projects" class="dashboard-section">
                <div class="section-header">
                    <h1>Project Management</h1>
                    <button class="btn btn-primary" id="add-project-btn">
                        <i class="fas fa-plus"></i> Add New Project
                    </button>
                </div>
                <div class="content-card">
                    <div id="projects-list">
                        <!-- Projects will be listed here -->
                        <p class="text-muted">Loading projects...</p>
                    </div>
                </div>
            </section>

            <!-- Content Section -->
            <section id="content" class="dashboard-section">
                <div class="section-header">
                    <h1>Edit Portfolio Content</h1>
                </div>
                <div class="content-card">
                    <form id="edit-content-form" class="modern-form">
                        <div class="input-group">
                            <label for="about-lead">About Lead Text</label>
                            <textarea id="about-lead" rows="3" placeholder="Lead text for about section"></textarea>
                        </div>
                        <div class="input-group">
                            <label for="about-body">About Body Text</label>
                            <textarea id="about-body" rows="6" placeholder="Main biography text"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </section>

            <!-- Messages Section -->
            <section id="messages" class="dashboard-section">
                <div class="section-header">
                    <h1>Messages</h1>
                </div>
                <div class="content-card">
                    <div id="messages-list">
                        <p class="text-muted">No messages found.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals (Simple implementations) -->
    <div id="project-modal" class="modal-overlay" style="display: none;">
        <div class="glass-panel modal-card">
            <h2 id="modal-title">Add Project</h2>
            <form id="project-form" class="modern-form">
                <input type="hidden" id="project-id">
                <div class="input-group">
                    <label for="p-title">Project Title</label>
                    <input type="text" id="p-title" required>
                </div>
                <div class="input-group">
                    <label for="p-desc">Description</label>
                    <textarea id="p-desc" rows="3" required></textarea>
                </div>
                <div class="input-group">
                    <label for="p-image">Image URL</label>
                    <input type="text" id="p-image" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>

</html>
