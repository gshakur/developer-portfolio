<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Mr Shakur</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="admin-auth-page">
    <div class="login-container">
        <div class="glass-panel login-card">
            <div class="login-header">
                <img src="logo.jpg" alt="Logo" class="login-logo">
                <h1>Admin Portal</h1>
                <p>Welcome back, please login to your account.</p>
            </div>
            <form id="login-form" class="modern-form">
                <div class="input-group">
                    <label for="password">Security Token</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="Enter token">
                        <i class="fas fa-key icon"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">
                    <span>Access Dashboard</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
                <div id="login-error" class="error-msg"></div>
            </form>
            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            // Simple demo check - "mrshakur19"
            if (password === 'mrshakur19') {
                localStorage.setItem('gs-admin-auth', 'true');
                window.location.href = 'admin.html';
            } else {
                const error = document.getElementById('login-error');
                error.innerText = 'Invalid token. Please try again.';
                error.style.display = 'block';
            }
        });
    </script>
</body>

</html>
